schema_version: 1.0.0
config_status: APPROVED_BASELINE
environment: shadow
runtime:
  timezone: UTC
  default_state: RISK_LOCKED
  graceful_shutdown_seconds: 30
account:
  exchange: BINANCE
  product: USD_M_FUTURES
  owner_mode: SINGLE_USER
  account_count: 1
  position_mode: ONE_WAY
  margin_type: CROSSED
services:
  control_api:
    container_bind_host: 0.0.0.0
    container_port: 8080
    host_publish_host: 127.0.0.1
    host_publish_port: 8080
  prometheus:
    container_bind_host: 0.0.0.0
    container_port: 9090
    host_publish_host: 127.0.0.1
    host_publish_port: 9090
    retention_days: 7
    retention_max_bytes: 8000000000
  alertmanager:
    container_bind_host: 0.0.0.0
    container_port: 9093
    host_publish_host: 127.0.0.1
    host_publish_port: 9093
storage:
  l2_root: /var/lib/ai-quant/l2
  parquet_compression: zstd
  slice_seconds: 3600
  max_local_age_hours: 72
  max_local_bytes: 80000000000
  delete_requires_remote_ack: true
  postgres_is_fact_source: true
  redis_is_fact_source: false
  disk_thresholds:
    combine_rule: ANY
    raw_warning_bytes: 60000000000
    raw_pause_new_entries_bytes: 72000000000
    raw_high_incident_bytes: 80000000000
    filesystem_warning_pct: 85
    filesystem_pause_new_entries_pct: 90
    filesystem_critical_pct: 95
    free_space_warning_bytes: 30000000000
    free_space_pause_new_entries_bytes: 20000000000
    free_space_p0_bytes: 10000000000
  archive_encryption:
    algorithm: age-x25519
    format_version: 1
    recipient_fingerprint: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    receipt_signature_algorithm: Ed25519
    receipt_verify_key_fingerprint: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    private_key_present_on_vps: false
    roundtrip_decrypt_sample_required: true
market_data:
  order_book_sequence_fields: [U, u, pu]
  invalid_book_blocks_new_entries: true
  reconnect_requires_snapshot_and_warmup: true
  exchange_rules_refresh_seconds: 900
  lightweight_market_scope: ALL_ELIGIBLE_USDT_PERPETUALS
  rest_base: https://fapi.binance.com
  websocket_api:
    enabled: false
    base_url: wss://ws-fapi.binance.com/ws-fapi/v1
    independent_connection: true
  official_connection_contract:
    path: /etc/ai-quant/host-control/binance-connection-contract.json
    schema_version: 1.0.0
    content_hash: eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
    checked_at: '2026-07-13T00:00:00Z'
    valid_until: '2026-07-14T00:00:00Z'
    exact_value_match_required: true
    expired_or_mismatch_action: BLOCK_ALL_NEW_BINANCE_EGRESS_AND_OPEN_P0
  websocket_routes:
    public:
      base_url: wss://fstream.binance.com/public
      stream_role: PUBLIC_HIGH_FREQUENCY
      stream_families: [depth, bookTicker]
    market:
      base_url: wss://fstream.binance.com/market
      stream_role: MARKET_REGULAR
      stream_families: [aggTrade, markPrice, kline]
    private:
      base_url: wss://fstream.binance.com/private
      stream_role: PRIVATE_USER_DATA
      stream_families: [userData]
    unrouted_paths_allowed: false
    independent_health_and_reconnect: true
    connection_lifetime_seconds: 86400
    rotate_no_later_than_seconds: 84600
    minimum_overlap_seconds: 60
    ping_interval_seconds: 180
    pong_deadline_seconds: 600
    control_messages_per_second: 10
    max_streams_per_connection: 1024
    url_and_role_in_signed_config: true
    probe_required: true
  merged_um_cm_universe:
    all_market_streams: ['!miniTicker@arr', '!bookTicker']
    required_payload_fields: [st, ps]
    archive_raw_fields: [st, ps]
    um_symbol_type: 1
    whitelist_source: CURRENT_UM_EXCHANGE_INFO
    selection_rule: ST_EQUALS_1_INTERSECT_CURRENT_UM_EXCHANGE_INFO
    missing_or_unknown_st_action: FAIL_CLOSED
    missing_or_invalid_ps_action: FAIL_CLOSED
  universe_l1_collection:
    eligible_scope: CURRENT_UM_USDT_PERPETUAL_WHITELIST
    turnover_activity_source: SYMBOL_KLINE_1M_CLOSED
    turnover_activity_route: /market
    kline_interval: 1m
    quote_notional_field: k.q
    trade_count_field: k.n
    closed_bars_required: 15
    allow_24h_rolling_ticker_delta: false
    spread_source: ALL_MARKET_BOOK_TICKER
    spread_route: /public
    spread_sample_interval_seconds: 1
    spread_statistic: MEDIAN_OF_900_UTC_ALIGNED_SAMPLES
    depth_primary_source: SYMBOL_PARTIAL_DEPTH20
    depth_primary_levels: 20
    depth_route: /public
    depth_update_interval_ms: 500
    deep_fallback_source: SYMBOL_DIFF_DEPTH
    deep_fallback_snapshot_endpoint: /fapi/v1/depth
    deep_fallback_snapshot_limit: 1000
    deep_fallback_max_symbols: 40
    deep_fallback_priority: [MANAGED_POSITION_SET, CURRENT_TOP10, CURRENT_RANK_11_15, CHEAP_PREFILTER_SCORE_DESC_SYMBOL_ASC]
    depth_band_bps: 10
    depth_sample_interval_seconds: 1
    depth_statistic: TWAP_OF_900_UTC_ALIGNED_SAMPLES
    window_slots: 900
    required_complete_slots: 896
    depth_band_coverage_rule: BOTH_SIDES_REACH_10BPS_FROM_SLOT_MID
    partial_band_failure_action: ENTER_H40_DEEP_FALLBACK_OR_INVALID
    insufficient_depth_action: SYMBOL_WINDOW_INVALID_NO_ZERO_NO_EXTRAPOLATION
    valid_snapshot_insufficient_candidates_action: PUBLISH_REDUCED_POOL_AND_ALERT
    globally_invalid_snapshot_action: FREEZE_LAST_GOOD_MEMBERSHIP_MANAGEMENT_ONLY_BLOCK_NEW_ENTRIES_AND_ALERT
    archive_rank_samples: true
    archive_all_universe_raw_depth_diffs: false
    public_stream_shard_max: 250
    rate_budget_authority: SIGNED_RATE_BUDGET_CONFIG_AND_ENDPOINT_COST_CATALOG
    rate_budget_config_hash_required: true
    request_priority: MARKET_DATA_SNAPSHOT
    universe_subcap_pct_of_total_limit: '60.00'
    subcap_within_normal_admission_bucket: true
    reserve_borrow_forbidden: true
    hardcoded_absolute_weight_limits: false
    stream_budget_rule: PUBLIC_ONE_DEPTH20_OR_DEEP_DIFF_PER_UM_SYMBOL_PLUS_ALL_BOOK_TICKER_MARKET_ONE_KLINE1M_PER_UM_SYMBOL_EACH_CONNECTION_WITHIN_SIGNED_CONNECTION_CONTRACT_LIMIT
    capacity_gate_required: true
    independent_collector_required_for_all_eligible_exact_depth: true
  order_flow_trade_semantics:
    standard_depth_includes_rpi: false
    subscribe_rpi_depth: false
    aggregate_trade_raw_fields: [q, nq, st, ps]
    feature_quantity_field: nq
    q_includes_rpi: true
    nq_normal_only: true
    allow_q_fallback: false
    missing_or_invalid_nq_action: FRAME_INVALID
    absent_ps_archival: EXPLICIT_NULL_DO_NOT_SYNTHESIZE
  user_data_stream:
    mode: REST_LISTEN_KEY
    rest_endpoint: /fapi/v1/listenKey
    create_method: POST
    keepalive_method: PUT
    close_method: DELETE
    validity_seconds: 3600
    keepalive_interval_seconds: 1800
    invalid_listen_key_error: -1125
    expired_event: listenKeyExpired
    websocket_route: /private
    connection_url_template: '{private_base}/ws?listenKey={listenKey}&events={events}'
    subscribed_events: [ORDER_TRADE_UPDATE, ACCOUNT_UPDATE, ALGO_UPDATE]
    events_query_value: ORDER_TRADE_UPDATE/ACCOUNT_UPDATE/ALGO_UPDATE
    event_separator: '/'
    replacement_requires_new_listen_key: true
    connection_lifetime_seconds: 86400
    rotate_no_later_than_seconds: 84600
    minimum_overlap_seconds: 60
    cross_type_ordering_primary_field: E
    dedup_identity_fields: [raw_event_type, stable_event_id]
    delivery_audit_field: received_at
    rotation_watermark_required: true
research:
  enabled_on_production_vps: false
  codex_strategy_enabled_on_production_vps: true
  openai_codex_required_for_primary: true
  monthly_research_enabled_on_production_vps: false
network:
  outbound_allowlist_mode: true
  egress_policy_schema_version: "1.0.0"
  egress_enforcement: APP_AND_HOST
  deny_cross_host_redirects: true
  maintenance_egress_default_enabled: false
  remote_admin_requires_ssh_tunnel: true
  static_source_ip_required_for_live: true
observability:
  metrics_include_symbol_labels: false
  structured_log_format: json
  redact_secrets: true
  external_heartbeat_required_for_live: true
  resource_thresholds:
    combine_rule: ANY
    cpu_defer_noncritical_pct: 70
    cpu_defer_duration_seconds: 300
    cpu_pause_new_entries_pct: 85
    cpu_pause_duration_seconds: 180
    memory_warning_bytes: 9663676416
    memory_pause_new_entries_bytes: 11274289152
    swap_thrashing_pauses_new_entries: true
  external_heartbeat:
    mode: SIGNED_OUTBOUND_PUSH
    signature_algorithm: Ed25519
    canonicalization: RFC8785_JCS
    receiver_id: replace-with-approved-receiver-id
    interval_seconds: 30
    request_timeout_seconds: 5
    missing_intervals_alert: 3
    replay_window_seconds: 120
config_files:
  risk: /etc/ai-quant/risk.yaml
  universe: /etc/ai-quant/universe.yaml
  price_action: /etc/ai-quant/price-action.yaml
  strategy_orchestration: /etc/ai-quant/strategy-orchestration.yaml
  auto_iteration: /etc/ai-quant/auto-iteration.yaml
  rate_budget: /etc/ai-quant/rate-budget.yaml
  endpoint_cost_catalog: /etc/ai-quant/host-control/binance-endpoint-cost-catalog.json
  mandatory_endpoint_inventory: /etc/ai-quant/host-control/binance-mandatory-endpoint-inventory.json
  connection_contract: /etc/ai-quant/host-control/binance-connection-contract.json
  capability_trust_bundle: /etc/ai-quant/host-control/capability-trust-bundle.json
  network_egress: /etc/ai-quant/network-egress.yaml
