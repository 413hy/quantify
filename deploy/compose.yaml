name: aiq-business

x-app-defaults: &app_defaults
  image: ${AIQ_APP_IMAGE:?set digest-pinned AIQ_APP_IMAGE}
  restart: unless-stopped
  read_only: true
  tmpfs: [/tmp]
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]
  networks: [business_data_net]

x-locked-command: &locked_command ["python", "-m", "ai_quant.services.locked_process"]

services:
  business-postgres:
    image: docker.io/timescale/timescaledb@sha256:ba149561ad4ddff5940d6eb0a0df60aefd1355cee1a450928f271267038fc888
    environment:
      POSTGRES_DB: aiq_business
      POSTGRES_USER: aiq_business
      POSTGRES_PASSWORD_FILE: /run/secrets/business_db_password
    secrets: [business_db_password]
    networks: [business_data_net]
    volumes: [business_pgdata:/var/lib/postgresql/data]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp, /var/run/postgresql]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]

  redis:
    image: docker.io/library/redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--appendonly", "yes", "--save", ""]
    networks: [business_data_net]
    volumes: [business_redisdata:/data]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  app-migrations:
    <<: *app_defaults
    profiles: [migrations]
    command: ["alembic", "-c", "migrations/business/alembic.ini", "upgrade", "head"]
    environment:
      AIQ_BUSINESS_DATABASE_URL_FILE: /run/secrets/business_database_url
    secrets: [business_database_url]
    restart: "no"

  realtime-engine:
    <<: *app_defaults
    user: "11001:11001"
    group_add: ["11990", "11991"]
    command: *locked_command
    environment:
      AIQ_SOCKET_PATH: /run/ai-quant-business/realtime-engine.sock
      AIQ_RUNTIME_STATE: RISK_LOCKED
      AIQ_RATE_SOCKET_PATH: /run/ai-quant-rate/rate.sock
      AIQ_GATEWAY_SOCKET_PATH: /run/ai-quant-egress/gateway.sock
    volumes:
      - type: bind
        source: /run/ai-quant-business
        target: /run/ai-quant-business
      - type: bind
        source: /run/ai-quant-rate
        target: /run/ai-quant-rate
        read_only: true
      - type: bind
        source: /run/ai-quant-egress
        target: /run/ai-quant-egress
        read_only: true

  execution-service:
    <<: *app_defaults
    user: "11002:11002"
    group_add: ["11990", "11991"]
    command: *locked_command
    environment:
      AIQ_SOCKET_PATH: /run/ai-quant-business/execution.sock
      AIQ_RUNTIME_STATE: RISK_LOCKED
      AIQ_RATE_SOCKET_PATH: /run/ai-quant-rate/rate.sock
      AIQ_GATEWAY_SOCKET_PATH: /run/ai-quant-egress/gateway.sock
      AIQ_BINANCE_SECRET_FILE: /run/secrets/binance_production_api_secret
    secrets: [binance_production_api_secret]
    volumes:
      - type: bind
        source: /run/ai-quant-business
        target: /run/ai-quant-business
      - type: bind
        source: /run/ai-quant-rate
        target: /run/ai-quant-rate
        read_only: true
      - type: bind
        source: /run/ai-quant-egress
        target: /run/ai-quant-egress
        read_only: true

  control-service:
    <<: *app_defaults
    command: *locked_command
    environment:
      AIQ_SOCKET_PATH: /run/ai-quant-business/control.sock
      AIQ_RUNTIME_STATE: RISK_LOCKED
    volumes:
      - type: bind
        source: /run/ai-quant-business
        target: /run/ai-quant-business

networks:
  business_data_net:
    internal: true

volumes:
  business_pgdata:
  business_redisdata:

secrets:
  business_db_password:
    file: ${BUSINESS_DB_PASSWORD_FILE:-/run/ai-quant-secrets/business-db-password}
  business_database_url:
    file: ${BUSINESS_DATABASE_URL_FILE:-/run/ai-quant-secrets/business-database-url}
  binance_production_api_secret:
    file: ${BINANCE_PRODUCTION_SECRET_FILE:-/run/ai-quant-secrets/binance-production-api-secret}
