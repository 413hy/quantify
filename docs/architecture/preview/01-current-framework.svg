<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text{font-family:"Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#172b4d}
      .title{font-size:28px;font-weight:700}.state{font-size:14px;font-weight:700}
      .head{font-size:18px;font-weight:700}.box{font-size:15px;font-weight:600}.note{font-size:14px}
      .panel{stroke-width:2;rx:14}.node{fill:#fff;stroke-width:2;rx:10}
      .edge{fill:none;stroke:#607d8b;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#607d8b"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="48" class="title" text-anchor="middle">AI Quant 无内置策略自动交易基础框架</text>
  <rect x="270" y="70" width="1060" height="42" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="800" y="96" class="state" text-anchor="middle">FRAMEWORK_READY · AUTOMATION_ENGINE_READY · NO_BUILTIN_STRATEGY · UNATTENDED_DISABLED · PRODUCTION_RISK_LOCKED</text>

  <rect x="35" y="145" width="250" height="520" class="panel" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="160" y="180" class="head" text-anchor="middle">外部边界</text>
  <rect x="60" y="215" width="200" height="75" class="node" stroke="#6c8ebf"/><text x="160" y="245" class="box" text-anchor="middle"><tspan x="160">Binance Testnet</tspan><tspan x="160" dy="23">行情 / 深度 / 账户事件</tspan></text>
  <rect x="60" y="340" width="200" height="65" class="node" stroke="#6c8ebf"/><text x="160" y="380" class="box" text-anchor="middle">未来项目决策源</text>
  <rect x="60" y="455" width="200" height="65" class="node" stroke="#6c8ebf"/><text x="160" y="495" class="box" text-anchor="middle">Telegram 通知出口</text>

  <rect x="320" y="145" width="360" height="520" class="panel" fill="#d5e8d4" stroke="#82b366"/>
  <text x="500" y="180" class="head" text-anchor="middle">数据与观测层（无决策权）</text>
  <rect x="345" y="215" width="140" height="70" class="node" stroke="#82b366"/><text x="415" y="244" class="box" text-anchor="middle"><tspan x="415">market_data</tspan><tspan x="415" dy="22">模型 / warm-up</tspan></text>
  <rect x="515" y="215" width="140" height="70" class="node" stroke="#82b366"/><text x="585" y="244" class="box" text-anchor="middle"><tspan x="585">orderbook</tspan><tspan x="585" dy="22">本地订单簿</tspan></text>
  <rect x="345" y="330" width="140" height="80" class="node" stroke="#82b366"/><text x="415" y="358" class="box" text-anchor="middle"><tspan x="415">archive</tspan><tspan x="415" dy="21">Parquet / replay</tspan><tspan x="415" dy="21">receipt / retention</tspan></text>
  <rect x="515" y="330" width="140" height="80" class="node" stroke="#82b366"/><text x="585" y="358" class="box" text-anchor="middle"><tspan x="585">features</tspan><tspan x="585" dy="21">PA / Order Flow</tspan><tspan x="585" dy="21">仅生成观测值</tspan></text>
  <rect x="345" y="455" width="140" height="65" class="node" stroke="#82b366"/><text x="415" y="495" class="box" text-anchor="middle">universe / ranking</text>
  <rect x="515" y="455" width="140" height="65" class="node" stroke="#82b366"/><text x="585" y="495" class="box" text-anchor="middle">research / evaluation</text>
  <rect x="345" y="565" width="310" height="65" rx="10" fill="#f8cecc" stroke="#b85450" stroke-width="2"/><text x="500" y="591" class="note" text-anchor="middle"><tspan x="500">不能自行选择币种、方向、</tspan><tspan x="500" dy="22">入场或平仓时机</tspan></text>

  <rect x="715" y="145" width="410" height="520" class="panel" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="920" y="180" class="head" text-anchor="middle">自动化、风险与执行层</text>
  <rect x="740" y="215" width="160" height="70" class="node" stroke="#d79b00"/><text x="820" y="244" class="box" text-anchor="middle"><tspan x="820">cost</tspan><tspan x="820" dy="22">费用 / 滑点 / 净边际</tspan></text>
  <rect x="940" y="215" width="160" height="70" class="node" stroke="#d79b00"/><text x="1020" y="244" class="box" text-anchor="middle"><tspan x="1020">risk</tspan><tspan x="1020" dy="22">仓位 / 硬限制</tspan></text>
  <rect x="740" y="325" width="360" height="95" class="node" stroke="#d79b00"/><text x="920" y="354" class="box" text-anchor="middle"><tspan x="920">automation + execution</tspan><tspan x="920" dy="22">持续轮询 · 时效 · 幂等 · 门禁</tspan><tspan x="920" dy="22">订单 / 对账 / 原生保护</tspan></text>
  <rect x="740" y="465" width="160" height="70" class="node" stroke="#d79b00"/><text x="820" y="494" class="box" text-anchor="middle"><tspan x="820">rate_budget</tspan><tspan x="820" dy="22">授权 / fencing</tspan></text>
  <rect x="940" y="465" width="160" height="70" class="node" stroke="#d79b00"/><text x="1020" y="494" class="box" text-anchor="middle"><tspan x="1020">binance_egress</tspan><tspan x="1020" dy="22">Testnet 受控出口</tspan></text>
  <rect x="740" y="575" width="360" height="55" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/><text x="920" y="598" class="note" text-anchor="middle"><tspan x="920">自动引擎已就绪；新项目决策适配器</tspan><tspan x="920" dy="20">接入前，无人值守服务保持禁用</tspan></text>

  <rect x="1160" y="145" width="405" height="520" class="panel" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="1362" y="180" class="head" text-anchor="middle">运维、存储与证据层</text>
  <rect x="1185" y="215" width="160" height="70" class="node" stroke="#9673a6"/><text x="1265" y="244" class="box" text-anchor="middle"><tspan x="1265">control</tspan><tspan x="1265" dy="22">命令 / 权限边界</tspan></text>
  <rect x="1380" y="215" width="160" height="70" class="node" stroke="#9673a6"/><text x="1460" y="244" class="box" text-anchor="middle"><tspan x="1460">monitoring</tspan><tspan x="1460" dy="22">指标 / 通知</tspan></text>
  <rect x="1185" y="330" width="160" height="70" class="node" stroke="#9673a6"/><text x="1265" y="359" class="box" text-anchor="middle"><tspan x="1265">archive / backup</tspan><tspan x="1265" dy="22">哈希链证据</tspan></text>
  <rect x="1380" y="330" width="160" height="70" class="node" stroke="#9673a6"/><text x="1460" y="359" class="box" text-anchor="middle"><tspan x="1460">validation</tspan><tspan x="1460" dy="22">平台 / 部署门禁</tspan></text>
  <ellipse cx="1265" cy="485" rx="80" ry="45" fill="#fff" stroke="#9673a6" stroke-width="2"/><text x="1265" y="480" class="box" text-anchor="middle"><tspan x="1265">Business DB</tspan><tspan x="1265" dy="21">市场 / 风险 / 执行</tspan></text>
  <ellipse cx="1460" cy="485" rx="80" ry="45" fill="#fff" stroke="#9673a6" stroke-width="2"/><text x="1460" y="480" class="box" text-anchor="middle"><tspan x="1460">Host-control DB</tspan><tspan x="1460" dy="21">额度 / 租约 / 审计</tspan></text>
  <rect x="1185" y="575" width="355" height="55" rx="10" fill="#f8cecc" stroke="#b85450" stroke-width="2"/><text x="1362" y="598" class="note" text-anchor="middle"><tspan x="1362">生产环境 RISK_LOCKED</tspan><tspan x="1362" dy="20">无生产凭证 · 无生产传输</tspan></text>

  <path d="M260 252 H345" class="edge"/><path d="M485 250 H515" class="edge"/>
  <path d="M260 372 H740" class="edge"/><path d="M900 250 V325" class="edge"/><path d="M1020 285 V325" class="edge"/>
  <path d="M920 420 V465 H940" class="edge"/><path d="M1100 500 H1185" class="edge"/>
  <path d="M1460 285 V455" class="edge"/><path d="M1265 400 V440" class="edge"/>
  <rect x="320" y="720" width="1245" height="70" rx="12" fill="#f5f5f5" stroke="#666"/>
  <text x="942" y="750" class="note" text-anchor="middle"><tspan x="942">完整交易意图 → 自动轮询 → 风险/成本门禁 → 受保护执行 → 对账/证据/通知</tspan><tspan x="942" dy="24">无意图时不造单；生产环境始终锁定</tspan></text>
</svg>
