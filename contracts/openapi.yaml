        mark_price:
          $ref: '#/components/schemas/NonNegativeDecimal'
        unrealized_pnl:
          $ref: '#/components/schemas/Decimal'
        protection_status:
          type: string
          enum: [VERIFIED, MISSING, UNKNOWN, NOT_REQUIRED_FLAT]
        owner_strategy_version:
          type: [string, 'null']
        membership:
          type: string
          enum: [TOP10, MANAGED_POSITION, EXTERNAL_UNKNOWN]
    Order:
      type: object
      additionalProperties: false
      required: [intent_id, transport, client_order_id, client_algo_id, exchange_order_id, algo_id, algo_status, actual_order_id, symbol, state, execution_type, source_event_key, order_role, order_type, side, original_quantity, executed_quantity, average_price, reduce_only, close_position, updated_at, reconciliation_required]
      properties:
        intent_id:
          $ref: '#/components/schemas/Id'
        transport:
          type: string
          enum: [STANDARD, ALGO]
        client_order_id:
          type: [string, 'null']
          pattern: '^[A-Za-z0-9._:-]{8,36}$'
        client_algo_id:
          type: [string, 'null']
          pattern: '^[A-Za-z0-9._:-]{8,36}$'
        exchange_order_id:
          type: [string, 'null']
        algo_id:
          type: [string, 'null']
        algo_status:
          type: [string, 'null']
          enum: [NEW, CANCELED, TRIGGERING, TRIGGERED, FINISHED, REJECTED, EXPIRED, UNKNOWN, null]
        actual_order_id:
          type: [string, 'null']
        symbol:
          $ref: '#/components/schemas/Symbol'
        state:
          $ref: '#/components/schemas/OrderState'
        execution_type:
          $ref: '#/components/schemas/OrderExecutionType'
        source_event_key:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '^[A-Za-z0-9._:-]+$'
        order_role:
          type: string
          enum: [ENTRY, STRATEGY_EXIT, STOP_LOSS, TAKE_PROFIT, RISK_EXIT, OPERATOR_FLATTEN, RECONCILIATION_REPAIR]
        order_type:
          type: string
          enum: [LIMIT, MARKET, STOP_MARKET, TAKE_PROFIT_MARKET]
        side:
          type: string
          enum: [BUY, SELL]
        original_quantity:
          $ref: '#/components/schemas/NonNegativeDecimal'
        executed_quantity:
          $ref: '#/components/schemas/NonNegativeDecimal'
        average_price:
          $ref: '#/components/schemas/NonNegativeDecimal'
        reduce_only:
          type: boolean
        close_position:
          type: boolean
        updated_at:
          type: string
          format: date-time
        reconciliation_required:
          type: boolean
    RiskStatus:
      type: object
      additionalProperties: false
      required: [as_of, risk_multiplier, risk_locked, lock_reasons, configured_limits, effective_limits, current]
      properties:
        as_of:
          type: string
          format: date-time
        risk_multiplier:
          type: string
          enum: ['0.10', '0.50', '1.00']
        risk_locked:
          type: boolean
        lock_reasons:
          type: array
          items:
            type: string
        configured_limits:
          description: 人工批准且不超过硬上限的完整风险配置，尚未应用启动倍率
          $ref: '#/components/schemas/RiskValues'
        effective_limits:
          description: 当前 risk_multiplier 应用后的真实准入阈值；并发持仓上限不缩放
          $ref: '#/components/schemas/RiskValues'
        current:
          description: 当前观测占用；事故状态可高于 effective_limits，因此只要求非负
          $ref: '#/components/schemas/RiskValues'
    RiskValues:
      type: object
      additionalProperties: false
      required: [per_trade_pct, total_open_pct, cluster_pct, daily_net_loss_pct, intraday_drawdown_pct, effective_leverage, concurrent_positions]
      properties:
