          type: integer
          minimum: 0
        scheduled_for:
          type: string
          format: date-time
        data_cutoff_at:
          type: string
          format: date-time
        mode:
          type: string
          enum: [OBSERVE_ONLY, AUTO_VALIDATION]
        stage:
          type: string
          enum: [QUEUED, QUEUED_BEHIND_QUOTA, MODEL_SELECTION, MONTHLY_ANALYSIS, DEFERRED_QUOTA, AUDIT, OFFLINE_VALIDATION, SHADOW, LIVE_0_10, LIVE_0_50, PROMOTION, ROLLBACK, COMPLETE]
        queue_position:
          type: [integer, 'null']
          minimum: 1
        model_selection_decision_id:
          oneOf:
            - $ref: '#/components/schemas/Id'
            - type: 'null'
        selected_model:
          type: [string, 'null']
          pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{1,127}$'
        selected_reasoning_effort:
          type: [string, 'null']
          enum: [low, medium, high, xhigh, null]
        quota_deferral_category:
          type: [string, 'null']
          enum: [SELECTOR_QUOTA, ANALYSIS_QUOTA, null]
        next_retry_at:
          type: [string, 'null']
          format: date-time
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        champion_package_hash:
          $ref: '#/components/schemas/Sha256'
        challenger_package_hash:
          oneOf:
            - $ref: '#/components/schemas/Sha256'
            - type: 'null'
        final_decision:
          type: [string, 'null']
          enum: [DEFERRED_QUOTA, OBSERVE_ONLY, NO_CHANGE, REJECTED, PROMOTED, ROLLED_BACK, ENGINEERING_PROPOSAL_ONLY, null]
        same_cycle_candidate_retry_forbidden:
          type: boolean
