          type: [string, 'null']
    AutoIterationStatus:
      type: object
      additionalProperties: false
      required: [iteration_cycle_id, attempt_id, attempt_number, scheduled_for, data_cutoff_at, mode, stage, queue_position, model_selection_decision_id, selected_model, selected_reasoning_effort, quota_deferral_category, next_retry_at, started_at, updated_at, champion_package_hash, challenger_package_hash, final_decision, same_cycle_candidate_retry_forbidden]
