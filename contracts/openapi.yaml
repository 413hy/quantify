          type: [string, 'null']
          format: date-time
        last_analysis_run_id:
          oneOf:
            - $ref: '#/components/schemas/Id'
            - type: 'null'
        last_thread_id:
          oneOf:
            - $ref: '#/components/schemas/Id'
            - type: 'null'
        session_isolation_status:
          type: string
          enum: [FRESH_EPHEMERAL_VERIFIED, NOT_APPLICABLE, VIOLATION]
